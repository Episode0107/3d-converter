<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>+EMA — Model Viewer</title>

<!-- model-viewer handles Draco-compressed .glb automatically -->
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --void:    #100E0B;   /* warm near-black gallery */
    --void-2:  #16130F;
    --sand:    #EDE6D8;   /* warm off-white */
    --muted:   #8A8273;
    --brass:   #C2A878;   /* restrained tropical-luxury accent */
    --line:    rgba(237, 230, 216, 0.14);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background:
      radial-gradient(120% 90% at 50% 18%, var(--void-2) 0%, var(--void) 62%);
    color: var(--sand);
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
  }

  .stage { position: fixed; inset: 0; }

  model-viewer {
    width: 100%;
    height: 100%;
    --poster-color: transparent;
    background: transparent;
    opacity: 0;
    transition: opacity 900ms ease;
  }
  model-viewer.ready { opacity: 1; }

  /* --- chrome: kept quiet so the model is the hero --- */

  .mark {
    position: fixed;
    top: clamp(18px, 3.5vw, 34px);
    left: clamp(18px, 3.5vw, 34px);
    z-index: 5;
    letter-spacing: 0.04em;
    font-weight: 500;
    font-size: 18px;
  }
  .mark .plus { color: var(--brass); }

  .caption {
    position: fixed;
    left: 0; right: 0;
    bottom: clamp(20px, 4vw, 38px);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    pointer-events: none;
    text-align: center;
  }
  .caption .rule {
    width: 46px; height: 1px;
    background: var(--brass);
    opacity: 0.7;
    margin-bottom: 10px;
  }
  .caption .title {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: clamp(26px, 4.4vw, 40px);
    line-height: 1.05;
  }
  .caption .meta {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* loading + error states speak in the interface's voice, no mood */
  .state {
    position: fixed; inset: 0;
    z-index: 4;
    display: grid; place-content: center;
    text-align: center;
    gap: 14px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: opacity 400ms ease;
  }
  .state.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    margin: 0 auto;
    border: 1px solid var(--line);
    border-top-color: var(--brass);
    border-radius: 50%;
    animation: spin 900ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
    model-viewer { transition: none; }
  }

  /* native AR button on mobile, styled to match */
  .ar-btn {
    position: absolute;
    bottom: 16px; right: 16px;
    background: rgba(16,14,11,0.6);
    border: 1px solid var(--line);
    color: var(--sand);
    backdrop-filter: blur(8px);
    font: 500 12px "Inter", sans-serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 2px;
    cursor: pointer;
  }
  .ar-btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }
</style>
</head>
<body>

  <div class="mark"><span class="plus">+</span>EMA</div>

  <div class="stage">
    <!-- ============================================================
         SET YOUR MODEL HERE: replace src with your optimized .glb
         (Draco-compressed, textures resized — see the pipeline).
         poster = optional loading image (a still render of the model).
         ============================================================ -->
    <model-viewer
      id="mv"
      src="models/villa.glb"
      alt="Tropical residence — interactive 3D model"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      auto-rotate-delay="2500"
      rotation-per-second="14deg"
      interaction-prompt="none"
      shadow-intensity="1"
      shadow-softness="0.9"
      exposure="1.05"
      tone-mapping="aces"
      environment-image="neutral"
      camera-orbit="-30deg 75deg auto"
      min-camera-orbit="auto 25deg auto"
      max-camera-orbit="auto 95deg auto"
      ar
      ar-modes="webxr scene-viewer quick-look">

      <button slot="ar-button" class="ar-btn">View in your space</button>
      <div slot="progress-bar"></div>
    </model-viewer>
  </div>

  <div class="caption">
    <div class="rule"></div>
    <div class="title">Villa — Working Title</div>
    <div class="meta">Koh Samui &nbsp;·&nbsp; +EMA Architecture</div>
  </div>

  <div class="state" id="state">
    <div class="spinner"></div>
    <div id="state-text">Loading model</div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const state = document.getElementById('state');
    const stateText = document.getElementById('state-text');

    mv.addEventListener('load', () => {
      mv.classList.add('ready');
      state.classList.add('hide');
    });

    mv.addEventListener('error', () => {
      mv.querySelector('.spinner')?.remove();
      state.classList.remove('hide');
      stateText.textContent = 'Model not found — check the src path';
      state.querySelector('.spinner')?.remove();
    });
  </script>
</body>
</html>
